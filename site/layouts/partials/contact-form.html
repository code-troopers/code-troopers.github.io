<!-- Contact Form (Netlify Forms) -->
<div class="contact-form">
  <h4>Envoyez-nous un message</h4>

  <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
    <p class="hidden" aria-hidden="true">
      <label>Ne pas remplir si vous êtes humain : <input name="bot-field" tabindex="-1" autocomplete="off"></label>
    </p>
    <div class="form-row">
      <div>
        <label for="contact-name">Nom</label>
        <input type="text" id="contact-name" name="name" placeholder="Votre nom" autocomplete="name" required aria-required="true">
      </div>
      <div>
        <label for="contact-email">E-mail</label>
        <input type="email" id="contact-email" name="email" placeholder="Votre e-mail" autocomplete="email" required aria-required="true">
      </div>
    </div>

    <div>
      <label for="contact-message">Votre message</label>
      <textarea id="contact-message" name="message" placeholder="Votre message" rows="6" required aria-required="true"></textarea>
    </div>

    <div class="form-submit">
      <button type="submit" class="btn">Envoyer</button>
    </div>
  </form>
</div>
