<section id="cloud" data-reveal>
    <div class="wrapper">
        <div class="cloud-static">
            {{ range (shuffle (.Site.Data.cloud.cloud)) }}
                <span class="cspan w{{ .weight }}" id="{{ .id }}" title="{{ .label }}">{{ .text }}</span>
            {{ end }}
        </div>
        <div class="cloud">

        </div>
    </div>
    <script type="module" src="/js/cloud.js"></script>
</section>
