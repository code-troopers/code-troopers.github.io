languageCode = "fr-FR"
defaultContentLang = "fr"
languageLang = "fr"
defaultContentLanguage = "fr"
title = "Code-Troopers"
baseurl = "/"

[outputs]
home = ["HTML"]
section = ["HTML", "RSS"]

[security]
enableInlineShortcodes = false

[security.exec]
allow = ["^dart-sass-embedded$", "^go$", "^npx$", "^postcss$", "^asciidoctor$"]
osEnv = ["(?i)^(PATH|PATHEXT|APPDATA|TMP|TEMP|TERM|RUBYLIB)$"]

[security.funcs]
getenv = ["^HUGO_"]

[security.http]
methods = ["(?i)GET|POST"]
urls = [".*"]

[params]
siteUrl = "https://code-troopers.com"
images = ["img/logo-code-troopers-tete-couleur.png"]

[markup]

[markup.goldmark]

[markup.goldmark.renderer]
unsafe = true

[taxonomies]
  category = 'categories'
  series = 'series'
  tag = 'tags'
  tipstag = 'tipstags'

